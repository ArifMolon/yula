name: Issue Close Knowledge Request
on:
  issues:
    types: [closed]
permissions:
  contents: write
  pull-requests: write
  issues: read
  actions: read
jobs:
  request:
    if: contains(github.event.issue.labels.*.name, 'kind:capability') && !startsWith(github.event.issue.title, '[Spec]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 24}
      - name: Validate operating model
        run: node scripts/validate-operating-model.mjs
      - name: Validate Project fields and latest HandoffBrief
        env:
          GH_TOKEN: ${{ secrets.YULA_PROJECT_TOKEN }}
        run: |
          handoff="my-docs/okf/handoffs/issue-${{ github.event.issue.number }}.json"
          test -f "$handoff"
          gh project item-list 5 --owner ArifMolon --limit 100 --format json > "$RUNNER_TEMP/project-items.json"
          node scripts/validate-project-item.mjs --handoff "$handoff" --project-items "$RUNNER_TEMP/project-items.json" --issue-number "${{ github.event.issue.number }}" --output "$RUNNER_TEMP/validated-issue.json"
      - name: Build deterministic KnowledgeUpdateRequested payload
        run: node scripts/request-knowledge-update.mjs --fixture "$RUNNER_TEMP/validated-issue.json" --write
      - name: Open and verify knowledge-only pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="knowledge/issue-${{ github.event.issue.number }}"
          git switch -c "$branch"
          git add my-docs/okf
          git commit -m "docs: request knowledge update for #${{ github.event.issue.number }}"
          git push origin "$branch"
          pr_url=$(gh pr create --title "Knowledge update for #${{ github.event.issue.number }}" --body "Generated from validated issue-close evidence. No lessons, plans, ADRs, prompts, or approvals are invented." --base main --head "$branch")
          node scripts/validate-operating-model.mjs
          test -s my-docs/okf/log.md # schema, provenance, and links are validated by the operating-model gate
          gh pr merge "$pr_url" --auto --squash
      - name: Emit structured failure-artifact for Review Inbox ingestion
        if: failure()
        run: |
          mkdir -p "$RUNNER_TEMP/failure-artifact"
          printf '%s\n' '{"type":"ReviewInboxIntegrationFailure","workflow":"issue-close-knowledge","issue":"${{ github.event.issue.number }}","run":"${{ github.run_id }}"}' > "$RUNNER_TEMP/failure-artifact/review-inbox-failure.json"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failure-artifact
          path: ${{ runner.temp }}/failure-artifact/review-inbox-failure.json
