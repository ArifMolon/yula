name: Issue Close Knowledge Request
on:
  issues:
    types: [closed]
permissions:
  contents: write
  pull-requests: write
  issues: read
jobs:
  request:
    if: contains(github.event.issue.labels.*.name, 'kind:capability')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 24}
      - name: Validate operating model
        run: node scripts/validate-operating-model.mjs
      - name: Validate Project fields and latest HandoffBrief
        run: |
          handoff="my-docs/okf/handoffs/issue-${{ github.event.issue.number }}.json"
          test -f "$handoff"
          node -e 'const fs=require("fs"); const p=process.argv[1]; const value=JSON.parse(fs.readFileSync(p)); if(value.status!=="Done") throw Error("Project/Handoff status must be Done");' "$handoff"
          cp "$handoff" "$RUNNER_TEMP/validated-issue.json"
      - name: Build deterministic KnowledgeUpdateRequested payload
        run: node scripts/request-knowledge-update.mjs --fixture "$RUNNER_TEMP/validated-issue.json" --write
      - name: Open knowledge-only pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="knowledge/issue-${{ github.event.issue.number }}"
          git switch -c "$branch"
          git add my-docs/okf
          git commit -m "docs: request knowledge update for #${{ github.event.issue.number }}"
          git push origin "$branch"
          gh pr create --title "Knowledge update for #${{ github.event.issue.number }}" --body "Generated from validated issue-close evidence. No lessons, plans, ADRs, prompts, or approvals are invented." --base main --head "$branch"
